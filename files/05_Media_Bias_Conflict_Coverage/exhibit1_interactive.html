  <title>Exhibit 1 Interactive Hover</title>
  <style>
    body {
      margin: 0;
      background: #f6f7f9;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      color: #202124;
    }
    .wrap {
      max-width: 1100px;
      margin: 22px auto;
      padding: 18px 20px 22px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(20, 27, 45, 0.08);
    }
    .subtitle {
      margin: 0 0 14px 0;
      font-size: 15px;
      color: #5d6470;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }
    .axis-label {
      font-size: 22px;
      fill: #202124;
    }
    .point {
      transition: r 120ms ease, fill-opacity 120ms ease, stroke-width 120ms ease;
      cursor: pointer;
    }
    .point:hover {
      r: 6.8;
      fill: rgba(32,102,172,0.72);
      stroke-width: 1.3;
    }
    .tooltip {
      position: fixed;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 120ms ease, transform 120ms ease;
      background: rgba(20, 24, 33, 0.96);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 18px 45px rgba(15, 18, 26, 0.28);
      min-width: 250px;
    }
    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .tooltip .title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: 0.1px;
    }
    .tooltip .meta {
      font-size: 13px;
      color: rgba(255,255,255,0.86);
      line-height: 1.35;
    }
  </style>
</head>

  <div id="tooltip" class="tooltip" role="tooltip" aria-hidden="true">
    <div class="title"></div>
    <div class="meta"></div>
  </div>
  <script>
    const tooltip = document.getElementById("tooltip");
    const title = tooltip.querySelector(".title");
    const meta = tooltip.querySelector(".meta");
    const points = document.querySelectorAll(".point");

    function moveTooltip(event) {
      const offsetX = 16;
      const offsetY = 18;
      const boxWidth = 280;
      let left = event.clientX + offsetX;
      let top = event.clientY + offsetY;
      if (left + boxWidth > window.innerWidth - 12) {
        left = event.clientX - boxWidth - 10;
      }
      if (top + 90 > window.innerHeight - 12) {
        top = event.clientY - 88;
      }
      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
    }

    points.forEach((point) => {
      point.addEventListener("mouseenter", (event) => {
        title.textContent = `${point.dataset.country} - ${point.dataset.onset}`;
        meta.textContent = `${point.dataset.articles} conflict articles, ${point.dataset.deaths} deaths`;
        tooltip.classList.add("visible");
        tooltip.setAttribute("aria-hidden", "false");
        moveTooltip(event);
      });
      point.addEventListener("mousemove", moveTooltip);
      point.addEventListener("mouseleave", () => {
        tooltip.classList.remove("visible");
        tooltip.setAttribute("aria-hidden", "true");
      });
    });
  </script>
